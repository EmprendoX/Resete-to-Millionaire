<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reset to Millionaire — Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent !important;
      font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.95);
      text-shadow:
        0 4px 14px rgba(0,0,0,0.92),
        0 2px 8px rgba(0,0,0,0.85),
        0 0 24px rgba(0,0,0,0.5);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      box-sizing: border-box;
      pointer-events: none !important;
      letter-spacing: -0.01em;
      overflow: hidden;
    }
    
    #text {
      background: transparent !important;
      padding: 16px 32px;
      border-radius: 0px;
      opacity: 0;
      transition: opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 90%;
      line-height: 1.4;
      word-wrap: break-word;
      pointer-events: none !important;
      mix-blend-mode: screen;
    }
    
    #text.flash {
      opacity: 1;
      animation: pulse 0.1s ease-in-out;
    }
    
    @keyframes pulse {
      0% { transform: scale(0.98); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="text">Soy un imán para las oportunidades financieras.</div>
  
  <script>
    // Función para mostrar flash
    function showFlash(text, duration) {
      const textEl = document.getElementById('text');
      
      // Primero asegurar que está invisible
      textEl.classList.remove('flash');
      textEl.style.opacity = '0';
      
      // Cambiar el texto
      textEl.textContent = text;
      
      // Forzar repaint
      void textEl.offsetHeight;
      
      // Mostrar el flash
      textEl.style.opacity = '';
      textEl.classList.add('flash');
      
      // Ocultar después de la duración
      setTimeout(() => {
        textEl.classList.remove('flash');
        textEl.style.opacity = '0';
      }, duration);
    }
    
    // Exponer función globalmente
    window.showFlash = showFlash;
  </script>
</body>
</html>
