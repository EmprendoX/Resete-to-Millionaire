# Configuración de Netlify para la landing page + PWA mobile
# - Publica docs/ (contiene landing en / y PWA en /mobile/)
# - No afecta la aplicación Electron

[build]
  base = "."
  publish = "docs"
  command = ""

# PWA mobile: normalizar /mobile → /mobile/ y servir su index.html en deep-links
[[redirects]]
  from = "/mobile"
  to = "/mobile/"
  status = 301

# Deep-links dentro de la PWA caen a su propio index.html (pero NO sobreescribimos
# assets existentes como sw.js, manifest, mp3, etc.)
[[redirects]]
  from = "/mobile/*"
  to = "/mobile/index.html"
  status = 200
  force = false

# Fallback SPA para la landing (solo fuera de /mobile)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Seguridad + rendimiento — landing
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Service worker: nunca cachear por el navegador (debe revalidar)
[[headers]]
  for = "/mobile/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/mobile/"

# Manifest
[[headers]]
  for = "/mobile/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=3600"

# Audio MP3 y assets estáticos: cache largo (se revalida por nombre/version)
[[headers]]
  for = "/mobile/assets/audio/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/mobile/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"
